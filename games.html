<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects & games</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="bg-gray-100 text-gray-900">
    
    <!-- Header with Navigation -->
    <header class="bg-white shadow fixed w-full z-10 top-0">
        <div class="container mx-auto px-6 py-6 flex items-center">
            <a href="index.html" id="home" class="nav-item text-2xl font-semibold">HOME</a>
            <nav class="ml-auto flex items-center">
                <a href="games.html" id="portfolio" class="nav-item px-4 py-2 font-bold">PORTFOLIO</a>
                <a href="designdoc.html" id="game-design" class="nav-item px-4 py-2 cursor-pointer font-semibold">GAME DESIGN</a>
                <a href="economicdoc.html" id="economics" class="nav-item px-4 py-2 cursor-pointer font-semibold">ECONOMICS</a>
                <a href="aboutme.html" id="about-me" class="nav-item px-4 py-2 font-bold">ABOUT ME</a>
                <a href="index.html#contact" id="contact" class="nav-item px-4 py-2 font-bold">CONTACT</a>
            </nav>
        </div>
    </header>

    <!-- Projects Section -->
    <section id="projects" class="min-h-screen flex flex-col justify-center bg-gray-200">
        <div class="container mx-auto px-6">
            <div id="featured-project" class="featured-project flex flex-wrap lg:flex-nowrap">
                <div class="featured-media w-full lg:w-2/5 relative">
                    <iframe src="https://www.youtube.com/embed/M7-Y4Lm8EAI?autoplay=1&mute=1&loop=1&modestbranding=1&rel=0&controls=0&playlist=M7-Y4Lm8EAI&modestbranding=1&showinfo=0&iv_load_policy=3&rel=0" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
                    <div class="overlay"></div>
                </div>
                <div class="featured-description w-full lg:w-3/5 lg:pl-12 mt-6 lg:mt-0">
                    <h3 class="text-3xl font-semibold mb-5" id="featured-title"></h3>
                    <p class="text-md leading-relaxed mb-5" id="featured-description"></p>
                    <a href="projects/economicdoc.html" target="_blank" class="text-teal text-blue-700 font-bold hover:text-teal-700" id="featured-link">View Project</a>
                </div>
            </div>
            <div class="project-cards flex flex-col mt-10">
                <div class="bg-gray-100 rounded-lg shadow-md project-card transform transition duration-300 hover:scale-105 hover:shadow-lg cursor-pointer" onclick="showProject('project-1')">
                    <img src="https://media1.tenor.com/m/iUaUtBpYU2oAAAAd/hv-mtl-keezi.gif" alt="Project Two Icon" class="w-full h-16 object-cover">
                </div>
                <div class="bg-gray-100 rounded-lg shadow-md project-card transform transition duration-300 hover:scale-105 hover:shadow-lg cursor-pointer" onclick="showProject('project-2')">
                    <img src="images/Infernitypic.gif" alt="Project One Icon" class="w-full h-16 object-cover">
                </div>
                <div class="bg-gray-100 rounded-lg shadow-md project-card transform transition duration-300 hover:scale-105 hover:shadow-lg cursor-pointer" onclick="showProject('project-3')">
                    <img src="https://pbs.twimg.com/profile_images/1589715753942540293/jrcOcqHT_400x400.jpg" alt="Project Three Icon" class="w-full h-16 object-cover">
                </div>
                <!-- Add more project cards as needed -->
            </div>
        </div>
        <!-- Chevron navigation -->
        <div class="absolute top-1/2 left-16 transform -translate-y-1/2">
            <button class="chevron" onclick="previousProject()">&#10094;</button>
        </div>
        <div class="absolute top-1/2 right-16 transform -translate-y-1/2">
            <button class="chevron" onclick="nextProject()">&#10095;</button>
        </div>
    </section>

    <!-- Include JavaScript -->
    <script src="js/games.js"></script>
    <script src="js/header.js"></script>
    <!-- Initial display of the first project -->
    <script showProject(projectKeys[currentProjectIndex]);></script>
    

</body>
</html>
