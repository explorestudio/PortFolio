<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Economic Documentation</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="bg-gray-100 text-gray-900">

    <!-- Header with Navigation -->

    <header class="bg-white shadow fixed w-full z-10 top-0">
        <div class="container mx-auto px-6 py-6 flex items-center">
            <a href="index.html" id="home" class="nav-item text-2xl font-semibold">HOME</a>
            <nav class="ml-auto flex items-center">
                <a href="games.html" id="portfolio" class="nav-item px-4 py-2 font-bold">PORTFOLIO</a>
                <a href="designdoc.html" id="game-design" class="nav-item px-4 py-2 cursor-pointer font-semibold">GAME DESIGN</a>
                <a href="economicdoc.html" id="economics" class="nav-item px-4 py-2 cursor-pointer font-semibold">ECONOMICS</a>
                <a href="aboutme.html" id="about-me" class="nav-item px-4 py-2 font-bold">ABOUT ME</a>
                <a href="index.html#contact" id="contact" class="nav-item px-4 py-2 font-bold">CONTACT</a>
            </nav>
        </div>
    </header>

    <!-- Economic Schemes Section -->
    <section id="economics" class="min-h-screen flex flex-col justify-center bg-gray-200">
        <div class="container mx-auto px-6">
            <div id="featured-scheme" class="featured-scheme flex flex-wrap lg:flex-nowrap">
                <div class="scheme-media w-full lg:w-2/3 relative">
                    <iframe src="https://my.machinations.io/d/clicker-v4/910429c003f011ee915c02f943517e50" style="width: 100%; height: 450px; border: none;"></iframe>
                </div>
                <div class="featured-description w-full lg:w-1/3 lg:pl-12 mt-6 lg:mt-0">
                    <h3 class="text-3xl font-bold mb-5" id="scheme-title"></h3>
                    <p class="text-md leading-relaxed mb-5" id="scheme-description"></p>
                </div>
            </div>
            <div class="scheme-cards grid grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4 mt-10">
                <div class="bg-gray-100 rounded-lg shadow-md scheme-card transform transition duration-300 hover:scale-105 hover:shadow-lg cursor-pointer" onclick="showScheme('scheme-1')">
                    <img src="https://images.crazygames.com/battle-button-clicker_16x9/20240408073743/battle-button-clicker_16x9-cover?auto=format%2Ccompress&q=45&cs=strip&ch=DPR&w=1200&h=630&fit=crop" alt="Scheme 1 Icon" class="w-full h-24 object-cover">
                </div>
                <div class="bg-gray-100 rounded-lg shadow-md scheme-card transform transition duration-300 hover:scale-105 hover:shadow-lg cursor-pointer" onclick="showScheme('scheme-2')">
                    <img src="https://media.licdn.com/dms/image/D5612AQH9moJNUa1TbQ/article-cover_image-shrink_600_2000/0/1689884395835?e=2147483647&v=beta&t=Jb1q5jo5JuvpeoCYTWY3NThFzqnyEE2pO4u3Vd1CeQg" alt="Scheme 2 Icon" class="w-full h-24 object-cover">
                </div>
                <div class="bg-gray-100 rounded-lg shadow-md scheme-card transform transition duration-300 hover:scale-105 hover:shadow-lg cursor-pointer" onclick="showScheme('scheme-3')">
                    <img src="https://pbs.twimg.com/profile_images/1589715753942540293/jrcOcqHT_400x400.jpg" alt="Scheme 3 Icon" class="w-full h-24 object-cover">
                </div>
                <!-- Add more scheme cards as needed -->
            </div>
        </div>
        <!-- Chevron navigation -->
        <div class="absolute top-1/2 left-16 transform -translate-y-1/2">
            <button class="chevron" onclick="previousScheme()">&#10094;</button>
        </div>
        <div class="absolute top-1/2 right-16 transform -translate-y-1/2">
            <button class="chevron" onclick="nextScheme()">&#10095;</button>
        </div>
    </section>

    <!-- Include JavaScript -->
    <script src="js/economic.js"></script>
    <script src="js/header.js"></script>

    <!-- Initial display of the first scheme -->
    <script showScheme(schemeKeys[currentSchemeIndex]);></script>

</body>
</html>
