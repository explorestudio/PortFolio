<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link href="../css/style.css" rel="stylesheet">
</head>
<body class="bg-gray-100 text-gray-900">

    <!-- Header with Navigation -->
    <header class="bg-white shadow fixed w-full z-10 top-0">
        <div class="container mx-auto px-6 py-3 flex justify-between items-center">
            <a href="#" class="text-lg font-semibold">My Portfolio</a>
            <nav class="space-x-4">
                <a href="#projects" class="px-4 py-2">Projects</a>
                <a href="#design-docs" class="px-4 py-2">Design Docs & Analysis</a>
            </nav>
        </div>
    </header>

    <!-- Projects Section -->
    <section id="projects" class="py-20 bg-white mt-24">
        <div class="container mx-auto px-6">
            <h2 class="text-3xl font-bold mb-6">Projects</h2>
            <div id="featured-project" class="featured-project">
                <div class="featured-media">
                    <img src="https://www.youtube.com/watch?v=6s_a8YN04Qc" alt="Featured Project" id="featured-image" style="width: 100%; height: auto; margin-right: 2rem;">
                </div>
                <div class="featured-description">
                    <h3 class="text-2xl font-bold mb-2" id="featured-title">Project One</h3>
                    <p class="text-lg leading-relaxed mb-4" id="featured-description">This is a brief description of Project One. It showcases the main features and technologies used.</p>
                    <a href="projects/clicker.html" target="_blank" class="text-teal-500 hover:text-teal-700" id="featured-link">View Project</a>
                </div>
            </div>
            <div class="project-cards">
                <div class="bg-gray-100 rounded-lg shadow-md project-card" onclick="showProject('project-1')">
                    <img src="https://cdn.discordapp.com/attachments/898572152813527061/1067284713770852433/157.gif?ex=66a51218&is=66a3c098&hm=aed4a2ec27cb5f84bdd83f2752ede54edcbf386f3ee5bb040be129cab39dbd44&" alt="Project One Icon">
                    <h3 class="text-sm font-bold mb-2">Project One</h3>
                </div>
                <div class="bg-gray-100 rounded-lg shadow-md project-card" onclick="showProject('project-2')">
                    <img src="https://via.placeholder.com/100" alt="Project Two Icon">
                    <h3 class="text-sm font-bold mb-2">Project Two</h3>
                </div>
                <div class="bg-gray-100 rounded-lg shadow-md project-card" onclick="showProject('project-3')">
                    <img src="https://via.placeholder.com/100" alt="Project Three Icon">
                    <h3 class="text-sm font-bold mb-2">Project Three</h3>
                </div>
                <!-- Add more project cards as needed -->
            </div>
        </div>
    </section>

    <!-- Include JavaScript -->
    <script src="../js/main.js"></script>
</body>
</html>
