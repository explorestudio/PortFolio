<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>

<body class="bg-black">

    <!-- Navigation -->
    <nav class="bg-black shadow fixed w-full z-10 top-0">
        <div class="container mx-auto px-6 py-6 flex items-center">
            <a href="index.html" class="text-5xl font-bold text-white flex-shrink-0">PLESEL DAVID</a>
            <div class="ml-auto flex items-center space-x-4">
                <a href="projects/games.html" class="nav-item px-4 py-2 cursor-pointer font-semibold text-white">PORTFOLIO</a>
                <a href="designdoc.html" class="px-4 py-2 cursor-pointer font-semibold text-white">DESIGN & ECONOMICS</a>
                <a href="#aboutme" class="nav-item px-4 py-2 cursor-pointer font-semibold text-white">ABOUT ME</a>
                <a href="#contact" class="nav-item px-4 py-2 cursor-pointer font-semibold text-white">CONTACT</a>
            </div>
        </div>
    </nav>

    <!-- About Section -->
    <section id="about" class="relative bg-blue-200 bg-opacity-0 flex items-center min-h-screen transition-transform transition-opacity duration-700 ease-out transition-hidden">
        <div class="container mx-auto flex flex-col md:flex-row items-center px-6 py-6">
            <div class="text-center md:text-left md:w-1/2 mb-6 md:mb-0">
                <h2 class="text-6xl font-bold mb-6 text-white">Economic & System</h2>
                <h2 class="text-6xl font-bold mb-6 text-blue-700">Game Designer</h2>
            </div>
            <div class="flex justify-center md:w-1/2">
                <img src="images/Photo.png" class="rounded-lg shadow-md w-full max-w-sm">
            </div>
        </div>
    </section>

    <!-- My Work Section -->
    <section id="mywork" class="bg-black-100 py-12">
        <div class="container mx-auto px-6 flex items-center">
            <!-- Title -->
            <h2 class="text-4xl font-bold text-white mr-12">My Portfolio</h2>
            
            <!-- Icons -->
            <div class="project-cards flex flex-col mt-10">
                <div class="bg-gray-100 rounded-lg shadow-md project-card transform transition duration-300 hover:scale-105 hover:shadow-lg cursor-pointer" onclick="showProject('project-1')">
                    <img src="images/Infernitypic.gif" alt="Project One Icon" class="w-full h-16 object-cover">
                </div>
                <div class="bg-gray-100 rounded-lg shadow-md project-card transform transition duration-300 hover:scale-105 hover:shadow-lg cursor-pointer" onclick="showProject('project-2')">
                    <img src="https://i.seadn.io/s/raw/files/8113474236c065a7308ccd0fe934fe2b.png?auto=format&dpr=1&w=3840" alt="Project Two Icon" class="w-full h-16 object-cover">
                </div>
                <div class="bg-gray-100 rounded-lg shadow-md project-card transform transition duration-300 hover:scale-105 hover:shadow-lg cursor-pointer" onclick="showProject('project-3')">
                    <img src="https://pbs.twimg.com/profile_images/1589715753942540293/jrcOcqHT_400x400.jpg" alt="Project Three Icon" class="w-full h-16 object-cover">
                </div>
                <!-- Add more project cards as needed -->
            </div>
        </div>
    </section>


    <!-- Main Section -->
    <section id="games">
        <div class="container mx-auto px-6">
            <div class="flex justify-center space-x-6">
                <div class="card bg-gray-100 rounded-lg shadow-md p-6 cursor-pointer games" onclick="location.href='projects/games.html'">
                    <img src="https://media.gqmagazine.fr/photos/646b7d71a35e700534ed9802/16:9/w_2560%2Cc_limit/100-best-games-hp-b.jpg" alt="Games">
                    <div class="card-content">
                        <h3 class="text-3xl font-bold mb-2">Projects & Games</h3>
                        <p class="text-lg leading-relaxed mb-4">Check the games and projects I've worked on</p>
                    </div>
                </div>
                <div class="card bg-gray-100 rounded-lg shadow-md p-6 cursor-pointer design-docs" onclick="location.href='designdoc.html'">
                    <img src="https://stability-images-upload.s3.amazonaws.com/v1_txt2img_08ea59dd-48fa-4f5d-85ba-e71ad50a03ba.png" alt="Design Docs Analysis">
                    <div class="card-content">
                        <h3 class="text-3xl font-bold mb-2">Design & Economic Docs</h3>
                        <p class="text-lg leading-relaxed mb-4">Read my design documents and see my work on game economy</p>
                    </div>
                </div>
            </div>
            <div class="section-heading text-center mt-10">
                <div id="work-title">SELECT A CATEGORY</div>
            </div>
        </div>
    </section> 

    <!-- Favorite Games Section -->

    <section id="favorite-games" class="py-20 bg-gray-200 bg-opacity-0">
        <div class="container mx-auto px-6">
            <h2 class="text-3xl font-bold mb-6">Favorite Games</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!--Game 1: Undertale --> 
                <div class="bg-gray-100 rounded-lg shadow-md p-6">
                    <img src="https://static.actugaming.net/media/2018/08/undertale-1-889x500.jpg" alt="Undertale" class="game-image rounded-md mb-4">
                </div>
                <!-- Game 2: League of Legends --> 
                <div class="bg-gray-100 rounded-lg shadow-md p-6">
                    <img src="https://i0.wp.com/onlyforgamer.com/wp-content/uploads/2018/02/512x51s-1.png?fit=512%2C512&ssl=1" alt="League of Legends" class="game-image rounded-md mb-4">
                </div>
                <!-- Game 3: Minecraft --> 
                <div class="bg-gray-100 rounded-lg shadow-md p-6">
                    <img src="https://e-enfance.org/wp-content/uploads/2021/06/mincraft.jpg" alt="Minecraft" class="game-image rounded-md mb-4">
                </div>
                <!-- Game 4: Outer Wilds --> 
                <div class="bg-gray-100 rounded-lg shadow-md p-6">
                    <img src="https://image.api.playstation.com/vulcan/ap/rnd/202208/1623/Zofebh60Ue7Zt5sC10UAtU3D.png" alt="Outer Wilds" class="game-image rounded-md mb-4">
                </div>
                <!-- Game 5: Tunic --> 
                <div class="bg-gray-100 rounded-lg shadow-md p-6">
                    <img src="https://cdn2.unrealengine.com/tunic-epic-shareimage-1920x1080-1920x1080-8bf937a9bd70.jpg" alt="Tunic" class="game-image rounded-md mb-4">
                </div>
            </div>
        </div>
    </section> 
    
    <!-- Contact Section -->

    <section id="contact" class="py-10 bg-gray-200">
        <div class="container mx-auto px-4 md:px-6 max-w-lg">
            <h2 class="text-3xl font-bold mb-6">Contact</h2>
            <form action="#" method="POST" class="w-full max-w-lg mx-auto">
                <div class="flex flex-wrap -mx-3 mb-6">
                    <div class="w-full px-3 mb-6">
                        <label class="block uppercase tracking-wide text-gray-700 text-xs font-bold mb-2" for="name">
                            Name
                        </label>
                        <input class="appearance-none block w-full bg-white text-gray-700 border border-gray-200 rounded py-3 px-4 leading-tight focus:outline-none focus:bg-white focus:border-gray-500" id="name" type="text" placeholder="Your Name">
                    </div>
                    <div class="w-full px-3 mb-6">
                        <label class="block uppercase tracking-wide text-gray-700 text-xs font-bold mb-2" for="email">
                            Email
                        </label>
                        <input class="appearance-none block w-full bg-white text-gray-700 border border-gray-200 rounded py-3 px-4 leading-tight focus:outline-none focus:bg-white focus:border-gray-500" id="email" type="email" placeholder="Your Email">
                    </div>
                    <div class="w-full px-3 mb-6">
                        <label class="block uppercase tracking-wide text-gray-700 text-xs font-bold mb-2" for="message">
                            Message
                        </label>
                        <textarea class="appearance-none block w-full bg-white text-gray-700 border border-gray-200 rounded py-3 px-4 leading-tight focus:outline-none focus:bg-white focus:border-gray-500" id="message" placeholder="Your Message"></textarea>
                    </div>
                    <div class="w-full px-3 mb-6">
                        <button class="bg-teal-500 hover:bg-teal-700 text-black font-bold py-2 px-4 rounded" type="submit">
                            Send
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </section> 

    <!-- Include JavaScript -->
    <script src="js/index.js"></script>

    <!-- Include JavaScript -->
    <script src="js/games.js"></script>

</body>
</html>
